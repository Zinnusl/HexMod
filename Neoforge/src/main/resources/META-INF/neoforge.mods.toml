modLoader = "kotlinforforge"
loaderVersion = "[5,)"
license = "MIT"

issueTrackerURL = "https://github.com/gamma-delta/HexMod/issues"

[[mods]]
modId = "hexcasting"
version = "${file.jarVersion}"
displayName = "Hex Casting"
displayURL = "https://github.com/gamma-delta/HexMod"
logoFile = "logo.png"
credits = "Falkory for textures; Wiresegal for lots of polish; Alwinfy for visual effects, proofreading, and code help; Kra3tor for sound effects; naj77 for the nice logo; and all of my wonderful patrons for supporting me!"
authors = "petrak@ (aka gamma-delta)"
description = "Cast powerful Hexes on the fly by drawing patterns with a staff."

[[mixins]]
config = "hexplat.mixins.json"
[[mixins]]
config = "hexcasting_forge.mixins.json"

[[dependencies.hexcasting]]
modId = "neoforge"
type = "required"
versionRange = "[21.1,22)"
ordering = "NONE"
side = "BOTH"

